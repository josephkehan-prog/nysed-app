# Nysed App Workflow Feature Development With Tests And Ui

## Action

Follow the feature-development-with-tests-and-ui workflow:
1. Implement or update core logic in TypeScript files (e.g., src/modules/*.ts or src/progress/*.ts)
2. Create or update React UI components (e.g., src/modules/*.tsx, src/components/*.tsx)
3. Write or update Jest/React Testing Library tests (e.g., *.test.ts, *.test.tsx)
4. Wire up new components to the main app (e.g., src/App.tsx)
5. Ensure build passes and tests are green

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/modules/ModulePlayer.tsx, src/modules/ModulePlayer.test.tsx, src/modules/ModuleCatalog.tsx

