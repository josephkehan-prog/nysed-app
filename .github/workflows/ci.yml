name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  web:
    name: Web (Vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node >= 24: the storage layer imports node:sqlite, unflagged from 23.4+.
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  python:
    name: Python services (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip sympy pytest
      - run: python -m pytest services pipeline
